<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamResize — Admin Panel</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-login{max-width:400px;margin:120px auto;padding:32px;background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-lg);text-align:center;backdrop-filter:blur(10px)}
    .admin-login h2{margin-bottom:8px}.admin-login p{color:var(--text-secondary);font-size:0.9rem;margin-bottom:20px}
    .admin-login .form-group{margin-bottom:16px}
    .admin-login input[type="password"]{text-align:center;font-size:1.1rem;letter-spacing:2px}
    .admin-login .login-error{color:var(--error);font-size:0.85rem;margin-top:8px;display:none}
    .admin-panel{display:none;padding:100px 0 60px}.admin-panel.visible{display:block}
    .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:16px}
    .admin-header h1{font-size:1.8rem}
    .admin-stats{display:flex;gap:12px;flex-wrap:wrap}
    .admin-stat{padding:12px 20px;background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-md);text-align:center;min-width:80px}
    .admin-stat-value{font-size:1.4rem;font-weight:700;font-family:'Outfit',sans-serif}
    .admin-stat-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase}
    .admin-stat.pending .admin-stat-value{color:var(--warning)}
    .admin-stat.accepted .admin-stat-value{color:var(--success)}
    .admin-stat.rejected .admin-stat-value{color:var(--error)}
    .admin-main-tabs{display:flex;gap:8px;margin-bottom:2rem;border-bottom:1px solid var(--border-glass);padding-bottom:12px}
    .admin-main-tab{padding:10px 24px;background:none;border:none;color:var(--text-muted);font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent}
    .admin-main-tab.active{color:var(--accent-3);border-bottom-color:var(--accent-1)}
    .admin-main-tab:hover:not(.active){color:var(--text-secondary)}
    .admin-section{display:none}.admin-section.visible{display:block}
    .admin-tabs{display:flex;gap:8px;margin-bottom:1.5rem}
    .admin-tab{padding:8px 20px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-xl);color:var(--text-secondary);font-size:0.85rem;font-weight:500;transition:all 0.2s;cursor:pointer;border:none}
    .admin-tab.active{background:var(--gradient-btn);color:#fff;border-color:transparent}
    .request-list{display:grid;gap:16px}
    .request-card{background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:24px;transition:all 0.2s}
    .request-card:hover{border-color:rgba(99,102,241,0.2)}
    .request-card-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;gap:12px}
    .request-exam-name{font-size:1.2rem;font-weight:700;font-family:'Outfit',sans-serif}
    .request-status{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;text-transform:uppercase}
    .request-status.pending{background:rgba(245,158,11,0.15);color:var(--warning)}
    .request-status.accepted{background:rgba(16,185,129,0.15);color:var(--success)}
    .request-status.rejected{background:rgba(239,68,68,0.15);color:var(--error)}
    .request-meta{display:flex;gap:16px;margin-bottom:8px;flex-wrap:wrap}
    .request-meta span{font-size:0.8rem;color:var(--text-muted)}
    .request-message{font-size:0.9rem;color:var(--text-secondary);margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.02);border-radius:var(--radius-sm);border-left:3px solid var(--accent-1)}
    .request-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn-accept{padding:8px 20px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-radius:var(--radius-md);font-weight:600;font-size:0.85rem;transition:all 0.2s;border:none;cursor:pointer}
    .btn-reject{padding:8px 20px;background:rgba(239,68,68,0.1);color:var(--error);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);font-weight:600;font-size:0.85rem;transition:all 0.2s;cursor:pointer}
    .btn-ai{padding:8px 20px;background:rgba(139,92,246,0.1);color:var(--accent-3);border:1px solid rgba(139,92,246,0.3);border-radius:var(--radius-md);font-weight:600;font-size:0.85rem;transition:all 0.2s;cursor:pointer}
    .spec-editor{display:none;margin-top:16px;padding:20px;background:rgba(255,255,255,0.02);border:1px solid var(--border-glass);border-radius:var(--radius-md)}
    .spec-editor.visible{display:block}
    .spec-editor h4{margin-bottom:16px}
    .spec-editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .spec-editor-full{grid-column:1/-1}
    .ai-loading{display:flex;align-items:center;gap:10px;padding:16px;background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.2);border-radius:var(--radius-md);margin-bottom:16px;font-size:0.9rem;color:var(--accent-3)}
    .doc-section{margin-top:16px;padding:16px;background:rgba(255,255,255,0.02);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.05)}
    .doc-section h5{margin-bottom:12px;color:var(--accent-3);font-size:0.9rem}
    .save-spec-btn{margin-top:16px;width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-radius:var(--radius-md);font-weight:600;transition:all 0.2s;border:none;cursor:pointer}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}.empty-state span{font-size:3rem;display:block;margin-bottom:12px}
    .admin-logout{padding:8px 16px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-secondary);font-size:0.85rem;transition:all 0.2s;cursor:pointer}
    .admin-logout:hover{background:rgba(239,68,68,0.1);color:var(--error)}
    /* Ad & Product forms */
    .admin-form{background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px}
    .admin-form h3{margin-bottom:16px;font-size:1.1rem}
    .admin-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .admin-form-grid .full{grid-column:1/-1}
    .admin-form-actions{margin-top:16px;display:flex;gap:10px}
    .admin-form-actions button{padding:10px 24px;border-radius:var(--radius-md);font-weight:600;font-size:0.85rem;border:none;cursor:pointer;transition:all 0.2s}
    .admin-form-actions .btn-save{background:var(--gradient-btn);color:#fff}
    .admin-form-actions .btn-cancel{background:var(--bg-glass);color:var(--text-secondary);border:1px solid var(--border-glass)}
    .ad-list,.product-list{display:grid;gap:12px}
    .ad-item,.product-item{background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-md);padding:16px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .ad-item-info,.product-item-info{flex:1}
    .ad-item-title,.product-item-title{font-weight:700;font-size:0.95rem;margin-bottom:4px}
    .ad-item-meta,.product-item-meta{font-size:0.8rem;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap}
    .ad-item-actions,.product-item-actions{display:flex;gap:8px}
    .btn-sm{padding:6px 14px;border-radius:var(--radius-sm);font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.2s;border:none}
    .btn-sm.edit{background:rgba(99,102,241,0.1);color:var(--accent-1)}
    .btn-sm.delete{background:rgba(239,68,68,0.1);color:var(--error)}
    .btn-sm.toggle{background:rgba(16,185,129,0.1);color:var(--success)}
    .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
    .metric-card{background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-md);padding:16px;text-align:center}
    .metric-card .metric-val{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800}
    .metric-card .metric-lbl{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;margin-top:4px}
  </style>
</head>
<body>
  <nav class="navbar"><div class="container"><div class="nav-brand"><div class="nav-logo" style="background:linear-gradient(135deg,#ef4444,#ec4899)">🔐</div><span>Exam<span style="color:var(--accent-3)">Resize</span> <span style="color:var(--text-muted);font-size:0.8rem">Admin</span></span></div><div class="nav-links"><a href="index.html">← Back to Site</a><button class="admin-logout" id="logout-btn">Logout</button></div></div></nav>

  <!-- Login Gate -->
  <div class="admin-login" id="login-gate">
    <h2>🔐 Admin Access</h2><p>Enter the admin password to continue</p>
    <form id="login-form"><div class="form-group"><input type="password" id="admin-password" placeholder="••••••••" required autocomplete="off"></div><button type="submit" class="modal-submit-btn">Unlock Panel</button><p class="login-error" id="login-error">Incorrect password. Try again.</p></form>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="admin-panel">
    <div class="container">
      <!-- Main Tabs: Requests | Ads | Products -->
      <div class="admin-main-tabs">
        <button class="admin-main-tab active" data-section="requests">📋 Exam Requests</button>
        <button class="admin-main-tab" data-section="ads">📢 Ads</button>
        <button class="admin-main-tab" data-section="products">🛍️ Products</button>
      </div>

      <!-- Section: Requests -->
      <div class="admin-section visible" id="section-requests">
        <div class="admin-header">
          <h1>📋 Exam Requests</h1>
          <div class="admin-stats">
            <div class="admin-stat pending"><div class="admin-stat-value" id="stat-pending">0</div><div class="admin-stat-label">Pending</div></div>
            <div class="admin-stat accepted"><div class="admin-stat-value" id="stat-accepted">0</div><div class="admin-stat-label">Accepted</div></div>
            <div class="admin-stat rejected"><div class="admin-stat-value" id="stat-rejected">0</div><div class="admin-stat-label">Rejected</div></div>
          </div>
        </div>
        <div class="admin-tabs" id="admin-tabs">
          <button class="admin-tab active" data-filter="pending">⏳ Pending</button>
          <button class="admin-tab" data-filter="accepted">✅ Accepted</button>
          <button class="admin-tab" data-filter="rejected">❌ Rejected</button>
          <button class="admin-tab" data-filter="all">📋 All</button>
        </div>
        <div class="request-list" id="request-list"></div>
      </div>

      <!-- Section: Ads -->
      <div class="admin-section" id="section-ads">
        <h1 style="margin-bottom:24px">📢 Ad Campaigns</h1>
        <div class="metrics-grid" id="ad-metrics"></div>
        <div class="admin-form" id="ad-form">
          <h3 id="ad-form-title">➕ Create New Ad</h3>
          <input type="hidden" id="ad-edit-id">
          <div class="admin-form-grid">
            <div class="form-group"><label>Ad Title *</label><input id="ad-title" placeholder="Summer Sale Banner"></div>
            <div class="form-group"><label>Position</label><select id="ad-position"><option value="top-banner">Top Banner</option><option value="between-sections">Between Sections</option><option value="sidebar">Sidebar</option><option value="footer-banner">Footer Banner</option></select></div>
            <div class="form-group full"><label>Image URL</label><input id="ad-image" placeholder="https://example.com/banner.jpg"></div>
            <div class="form-group full"><label>Destination URL *</label><input id="ad-destination" placeholder="https://example.com/offer"></div>
            <div class="form-group"><label>Description</label><input id="ad-description" placeholder="Short description"></div>
            <div class="form-group"><label>CTA Text</label><input id="ad-cta" placeholder="Learn More" value="Learn More"></div>
            <div class="form-group"><label>Start Date</label><input type="date" id="ad-start"></div>
            <div class="form-group"><label>End Date</label><input type="date" id="ad-end"></div>
          </div>
          <div class="admin-form-actions">
            <button class="btn-save" id="ad-save-btn">💾 Save Ad</button>
            <button class="btn-cancel" id="ad-cancel-btn" style="display:none">Cancel</button>
          </div>
        </div>
        <div class="ad-list" id="ad-list"></div>
      </div>

      <!-- Section: Products -->
      <div class="admin-section" id="section-products">
        <h1 style="margin-bottom:24px">🛍️ Affiliate Products</h1>
        <div class="metrics-grid" id="product-metrics"></div>
        <div class="admin-form" id="product-form">
          <h3 id="product-form-title">➕ Add New Product</h3>
          <input type="hidden" id="prod-edit-id">
          <div class="admin-form-grid">
            <div class="form-group full"><label>Product Title *</label><input id="prod-title" placeholder="Product name"></div>
            <div class="form-group full"><label>Description</label><input id="prod-desc" placeholder="Short description"></div>
            <div class="form-group"><label>Price (₹) *</label><input type="number" id="prod-price" placeholder="999"></div>
            <div class="form-group"><label>Original Price (₹)</label><input type="number" id="prod-original" placeholder="1499"></div>
            <div class="form-group"><label>Platform</label><select id="prod-platform"><option value="amazon">Amazon</option><option value="flipkart">Flipkart</option><option value="other">Other</option></select></div>
            <div class="form-group"><label>Category</label><select id="prod-category"><option value="books">Books</option><option value="electronics">Electronics</option><option value="study">Study Material</option><option value="accessories">Accessories</option></select></div>
            <div class="form-group full"><label>Image URL</label><input id="prod-image" placeholder="https://m.media-amazon.com/images/..."></div>
            <div class="form-group full"><label>Affiliate URL *</label><input id="prod-affiliate" placeholder="https://www.amazon.in/dp/..."></div>
          </div>
          <div class="admin-form-actions">
            <button class="btn-save" id="prod-save-btn">💾 Save Product</button>
            <button class="btn-cancel" id="prod-cancel-btn" style="display:none">Cancel</button>
          </div>
        </div>
        <div class="product-list" id="product-list"></div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
